<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GH Deployment Workflow</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            max-width: 600px;
            margin: 80px auto;
            padding: 0 20px;
            background: #0d1117;
            color: #e6edf3;
            text-align: center;
        }
        h1 { color: #58a6ff; }
        p { color: #8b949e; line-height: 1.6; }
        .badge {
            display: inline-block;
            margin-top: 20px;
            padding: 8px 16px;
            background: #238636;
            color: #fff;
            border-radius: 6px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <h1>Hello from Karmela!</h1>
    <p>This page was deployed automatically using GitHub Actions.</p>
    <span class="badge">Deployed successfully</span>
</body>
</html>
