<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} — {{ site.title }}</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Space Grotesk', sans-serif;
            max-width: 650px;
            margin: 0 auto;
            padding: 60px 24px;
            background: #1a1025;
            color: #e8e0f0;
            line-height: 1.8;
        }

        /* --- Gradient heading --- */
        h1 {
            font-size: 2.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #f472b6, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
        }

        h2 {
            font-size: 1.3rem;
            font-weight: 600;
            color: #c084fc;
            margin-top: 40px;
            margin-bottom: 12px;
            padding-bottom: 6px;
            border-bottom: 2px solid #2d2040;
        }

        p {
            color: #b8a8cc;
            margin-bottom: 16px;
        }

        strong { color: #e8e0f0; }

        /* --- Fun list items with emoji bullets --- */
        ul, ol {
            padding-left: 0;
            list-style: none;
            margin-bottom: 16px;
        }

        li {
            color: #b8a8cc;
            margin-bottom: 8px;
            padding-left: 24px;
            position: relative;
        }

        ul li::before {
            content: "✦";
            position: absolute;
            left: 0;
            color: #a78bfa;
        }

        ol { counter-reset: fun-counter; }
        ol li { counter-increment: fun-counter; }
        ol li::before {
            content: counter(fun-counter) ".";
            position: absolute;
            left: 0;
            color: #f472b6;
            font-weight: 700;
        }

        /* --- Code tags --- */
        code {
            background: #2d2040;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 0.88rem;
            color: #a78bfa;
            font-family: "SF Mono", "Fira Code", monospace;
        }

        /* --- Blockquote --- */
        blockquote {
            border-left: 3px solid #a78bfa;
            margin: 24px 0;
            padding: 16px 20px;
            background: #231833;
            border-radius: 0 12px 12px 0;
        }

        blockquote p {
            color: #c084fc;
            font-style: italic;
            margin: 0;
        }

        /* --- Links --- */
        a {
            color: #f472b6;
            text-decoration: none;
            border-bottom: 1px dashed #f472b680;
            transition: all 0.2s;
        }

        a:hover {
            color: #a78bfa;
            border-bottom-color: #a78bfa;
        }

        /* --- Back link --- */
        .back {
            display: inline-block;
            margin-bottom: 32px;
            font-size: 0.9rem;
            color: #8b7a9e;
            border-bottom: none;
            padding: 6px 14px;
            border-radius: 20px;
            background: #231833;
            transition: all 0.2s;
        }

        .back:hover {
            background: #2d2040;
            color: #c084fc;
        }

        /* --- Fun card wrapper for content sections --- */
        h2 + ul, h2 + ol, h2 + p {
            background: #231833;
            padding: 20px 24px;
            border-radius: 12px;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <a class="back" href="{{ site.baseurl }}/">&larr; Back</a>
    <h1>{{ page.title }}</h1>
    {{ content }}
</body>
</html>
